<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Character Festival — 우리반 AI 캐릭터 게임 (2D)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
/* ============================================================
   AI Character Festival (2D 버전)
   - WebGL / Three.js 없이 Canvas 2D 만으로 동작
   - 학생들이 만든 AI 캐릭터 "이미지"가 게임에 직접 참가
   디자인 컨셉 : 교실 축제(운동회) — 크림 종이 + 크레파스 팔레트
   시그니처 : 상단 가랜드(만국기)
   ============================================================ */
:root{
  --paper:#FFF8E7; --ink:#3D3A50;
  --pink:#FF6B9D; --yellow:#FFC93C; --blue:#4DA8FF;
  --green:#5FCB77; --purple:#9B7EDE;
  --card:#FFFFFF;
  --shadow:0 6px 0 rgba(61,58,80,.15);
  --radius:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Gowun Dodum',sans-serif;background:var(--paper);color:var(--ink);
  overflow-x:hidden;
  background-image:radial-gradient(rgba(61,58,80,.05) 1px, transparent 1px);
  background-size:22px 22px;
}
h1,h2,h3,.jua{font-family:'Jua',sans-serif;letter-spacing:.5px}

/* ---------- 가랜드(만국기) ---------- */
.bunting{position:fixed;top:0;left:0;right:0;height:64px;pointer-events:none;z-index:50;display:flex;justify-content:center;gap:6px}
.bunting::before{content:"";position:absolute;top:8px;left:-5%;right:-5%;height:2px;background:var(--ink);opacity:.25;transform:rotate(-.4deg)}
.flag{width:34px;height:44px;margin-top:9px;clip-path:polygon(0 0,100% 0,50% 100%);animation:sway 3.4s ease-in-out infinite;transform-origin:top center}
.flag:nth-child(5n+1){background:var(--pink)}
.flag:nth-child(5n+2){background:var(--yellow)}
.flag:nth-child(5n+3){background:var(--blue)}
.flag:nth-child(5n+4){background:var(--green)}
.flag:nth-child(5n+5){background:var(--purple)}
.flag:nth-child(2n){animation-delay:-1.7s}
@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@media (prefers-reduced-motion:reduce){.flag{animation:none}}

/* ---------- 화면 전환 ---------- */
.screen{display:none;min-height:100vh;padding:90px 18px 40px;max-width:1100px;margin:0 auto}
.screen.active{display:block;animation:pop .35s ease}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.screen.active{animation:none}}

/* ---------- 버튼 ---------- */
.btn{
  font-family:'Jua',sans-serif;font-size:1.25rem;border:3px solid var(--ink);
  border-radius:var(--radius);padding:16px 26px;cursor:pointer;color:var(--ink);
  background:var(--card);box-shadow:var(--shadow);
  transition:transform .12s ease, box-shadow .12s ease;
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
}
.btn:hover{transform:translateY(-3px)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(61,58,80,.15)}
.btn:focus-visible{outline:4px solid var(--blue);outline-offset:3px}
.btn.pink{background:var(--pink);color:#fff}
.btn.yellow{background:var(--yellow)}
.btn.blue{background:var(--blue);color:#fff}
.btn.green{background:var(--green);color:#fff}
.btn.purple{background:var(--purple);color:#fff}
.btn.small{font-size:1rem;padding:10px 18px;border-width:2px;border-radius:16px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* ---------- 첫 화면 ---------- */
#screen-home{display:none;text-align:center}
#screen-home.active{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px}
.home-title{font-size:clamp(2.4rem,8vw,4.6rem);line-height:1.15}
.home-title .accent{color:var(--pink)}
.home-sub{
  font-family:'Jua',sans-serif;font-size:clamp(1rem,3.5vw,1.4rem);
  background:var(--yellow);border:3px solid var(--ink);border-radius:999px;
  padding:8px 26px;box-shadow:var(--shadow);transform:rotate(-2deg);
}
.home-eyebrow{font-family:'Jua',sans-serif;color:var(--blue);font-size:1.1rem;letter-spacing:3px}
.home-buttons{display:grid;grid-template-columns:repeat(2,minmax(150px,240px));gap:18px}
.home-buttons .btn{font-size:1.35rem;padding:22px 10px;flex-direction:column}
.home-buttons .btn .emoji{font-size:2rem}
.home-count{font-family:'Jua',sans-serif;opacity:.75}
@media (max-width:520px){.home-buttons{grid-template-columns:1fr 1fr;width:100%}}

/* ---------- 공통 헤더 / 패널 ---------- */
.top-bar{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.top-bar h2{font-size:clamp(1.6rem,5vw,2.3rem)}
.top-bar .spacer{flex:1}
.panel{background:var(--card);border:3px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px}

/* ---------- 업로드 폼 ---------- */
.form-grid{display:grid;gap:16px;max-width:520px;margin:0 auto}
.form-grid label{font-family:'Jua',sans-serif;font-size:1.05rem}
.form-grid input[type=text]{
  width:100%;font-family:'Gowun Dodum',sans-serif;font-size:1.05rem;
  border:3px solid var(--ink);border-radius:14px;padding:12px 14px;background:#FFFDF6;
}
.form-grid input[type=text]:focus{outline:3px solid var(--blue);outline-offset:2px}
.dropzone{
  border:3px dashed var(--ink);border-radius:var(--radius);padding:26px 16px;
  text-align:center;cursor:pointer;background:#FFFDF6;transition:background .15s ease;
}
.dropzone.drag,.dropzone:hover{background:#FFF3CF}
.dropzone .big{font-size:2.4rem}
.preview-img{max-width:120px;max-height:120px;border:3px solid var(--ink);border-radius:14px;background:#fff;margin-top:10px;display:none}
.upload-msg{font-family:'Jua',sans-serif;text-align:center;padding:12px;border-radius:14px;display:none}
.upload-msg.ok{display:block;background:#E3F9E8;border:2px solid var(--green);color:#1E7B3A}
.upload-msg.err{display:block;background:#FFE4EA;border:2px solid var(--pink);color:#C22B5A}

/* ---------- 갤러리 (2D 격자) ---------- */
.gallery2d{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;
}
.g2d-card{
  background:#fff;border:3px solid var(--ink);border-radius:18px;padding:12px;
  text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s;
}
.g2d-card:hover{transform:translateY(-4px) rotate(-1deg)}
.g2d-card:focus-visible{outline:4px solid var(--blue);outline-offset:3px}
.g2d-card img{width:100%;aspect-ratio:1;object-fit:contain;background:#F4FBFF;border-radius:12px;border:2px solid #E4EEF5}
.g2d-card .cname{font-family:'Jua',sans-serif;font-size:1.05rem;margin-top:8px}
.g2d-card .sname{font-size:.8rem;opacity:.7}
.lightbox{
  position:fixed;inset:0;z-index:90;background:rgba(61,58,80,.55);
  display:none;align-items:center;justify-content:center;padding:20px;
}
.lightbox.show{display:flex}
.lightbox .inner{
  background:var(--paper);border:4px solid var(--ink);border-radius:26px;
  box-shadow:var(--shadow);padding:24px;text-align:center;max-width:min(440px,92vw);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.lightbox img{max-width:100%;max-height:52vh;object-fit:contain;border-radius:16px;background:#fff}
.lightbox .cname{font-family:'Jua',sans-serif;font-size:1.7rem}
.empty-note{opacity:.6;text-align:center;padding:40px 10px;font-family:'Jua',sans-serif}

/* ---------- 게임 선택 ---------- */
.game-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px}
.game-card{
  background:var(--card);border:3px solid var(--ink);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:22px;text-align:center;cursor:pointer;transition:transform .12s ease;
}
.game-card:hover{transform:translateY(-4px) rotate(-1deg)}
.game-card:focus-visible{outline:4px solid var(--blue);outline-offset:3px}
.game-card .icon{font-size:3rem}
.game-card h3{font-size:1.4rem;margin:8px 0 4px}
.game-card p{font-size:.92rem;opacity:.8}
.game-card .tag{display:inline-block;margin-top:10px;font-family:'Jua',sans-serif;font-size:.85rem;border:2px solid var(--ink);border-radius:999px;padding:3px 12px}
.game-card:nth-child(1) .tag{background:var(--pink);color:#fff}
.game-card:nth-child(2) .tag{background:var(--blue);color:#fff}
.game-card:nth-child(3) .tag{background:var(--green);color:#fff}
.game-card:nth-child(4) .tag{background:var(--yellow)}
.game-card:nth-child(5) .tag{background:var(--purple);color:#fff}

/* ---------- 게임 캔버스 화면 ---------- */
.canvas-holder{
  position:relative;border:3px solid var(--ink);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);background:#CFEBFF;
  height:62vh;min-height:340px;
}
.canvas-holder canvas{display:block;width:100%;height:100%}
.game-hud{
  position:absolute;top:12px;left:12px;right:12px;display:flex;gap:10px;
  align-items:flex-start;pointer-events:none;z-index:5;flex-wrap:wrap;
}
.hud-box{
  background:rgba(255,255,255,.94);border:3px solid var(--ink);border-radius:16px;
  padding:8px 16px;font-family:'Jua',sans-serif;box-shadow:var(--shadow);
}
.hud-box.big{font-size:1.4rem}
.game-overlay{
  position:absolute;inset:0;display:none;z-index:10;
  align-items:center;justify-content:center;flex-direction:column;gap:18px;
  background:rgba(255,248,231,.9);text-align:center;padding:20px;overflow:auto;
}
.game-overlay.show{display:flex}
.countdown{font-family:'Jua',sans-serif;font-size:7rem;color:var(--pink);text-shadow:4px 4px 0 rgba(61,58,80,.15)}
.result-list{display:flex;flex-direction:column;gap:10px;max-width:420px;width:100%}
.result-row{
  display:flex;align-items:center;gap:12px;background:#fff;border:3px solid var(--ink);
  border-radius:16px;padding:8px 14px;box-shadow:var(--shadow);text-align:left;
}
.result-row .rank{font-family:'Jua',sans-serif;font-size:1.5rem;width:52px;text-align:center}
.result-row img{width:52px;height:52px;border-radius:12px;border:2px solid var(--ink);background:#fff;object-fit:contain}
.result-row .who{flex:1}
.result-row .who .cname{font-family:'Jua',sans-serif;font-size:1.15rem}
.result-row .who .sname{font-size:.85rem;opacity:.7}
.result-row.gold{background:#FFF3C4}
.result-row .score{font-family:'Jua',sans-serif}

/* ---------- 토너먼트 HUD ---------- */
.battle-hud{position:absolute;left:0;right:0;top:10px;display:flex;justify-content:space-between;padding:0 14px;gap:10px;z-index:5;pointer-events:none}
.fighter-card{background:rgba(255,255,255,.95);border:3px solid var(--ink);border-radius:16px;padding:10px 14px;width:46%;max-width:280px;box-shadow:var(--shadow)}
.fighter-card .fname{font-family:'Jua',sans-serif;font-size:1.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hp-bar{height:14px;border:2px solid var(--ink);border-radius:99px;background:#fff;overflow:hidden;margin-top:6px}
.hp-fill{height:100%;width:100%;background:var(--green);transition:width .25s}
.hp-fill.low{background:var(--pink)}
.fighter-card .stats{font-size:.78rem;opacity:.8;margin-top:5px}
.battle-log{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;
  background:rgba(255,255,255,.94);border:3px solid var(--ink);border-radius:16px;
  padding:8px 20px;font-family:'Jua',sans-serif;max-width:92%;text-align:center;
}
.bracket{display:flex;flex-direction:column;gap:8px;max-width:460px;width:100%;max-height:40vh;overflow:auto}
.bracket .match{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:2px solid var(--ink);border-radius:12px;padding:6px 12px;font-size:.95rem}
.bracket .match .w{font-family:'Jua',sans-serif;color:#1E7B3A}
.champ-img{width:150px;height:150px;border:4px solid var(--ink);border-radius:24px;background:#fff;object-fit:contain}

/* ---------- 빙고 / 캐릭터 찾기 ---------- */
.pick-stage{display:flex;flex-direction:column;align-items:center;gap:18px}
.pick-big{
  width:min(300px,70vw);aspect-ratio:1;border:4px solid var(--ink);border-radius:26px;
  background:#fff;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.pick-big img{width:100%;height:100%;object-fit:contain}
.pick-big .qmark{font-family:'Jua',sans-serif;font-size:7rem;color:var(--purple)}
.pick-big.spin img{animation:flash .18s linear infinite}
@keyframes flash{from{opacity:.35}to{opacity:1}}
.pick-name{font-family:'Jua',sans-serif;font-size:1.7rem;text-align:center;min-height:2.2rem}
.picked-strip{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:720px}
.picked-strip img{width:56px;height:56px;border-radius:12px;border:2px solid var(--ink);background:#fff;object-fit:contain}
.hint-box{background:#fff;border:3px solid var(--ink);border-radius:18px;box-shadow:var(--shadow);padding:16px 22px;max-width:520px;width:100%}
.hint-box li{margin-left:22px;margin-top:6px;font-size:1.05rem}
.silhouette img{filter:brightness(0) opacity(.85)}
.silhouette.reveal img{filter:none;transition:filter .6s}

/* ---------- 관리자 ---------- */
.admin-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.admin-row{display:flex;align-items:center;gap:12px;background:#fff;border:2px solid var(--ink);border-radius:14px;padding:8px 12px}
.admin-row img{width:48px;height:48px;border-radius:10px;border:2px solid var(--ink);background:#fff;object-fit:contain}
.admin-row .who{flex:1;min-width:0}
.admin-row .who .cname{font-family:'Jua',sans-serif}
.admin-row .who .sname{font-size:.82rem;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.stat-chip{font-family:'Jua',sans-serif;background:var(--yellow);border:2px solid var(--ink);border-radius:999px;padding:6px 18px}

/* ---------- 사운드 / 폭죽 / 토스트 ---------- */
.sound-fab{
  position:fixed;right:16px;bottom:16px;z-index:60;width:58px;height:58px;
  border-radius:50%;border:3px solid var(--ink);background:var(--card);
  box-shadow:var(--shadow);font-size:1.6rem;cursor:pointer;
}
.sound-fab:focus-visible{outline:4px solid var(--blue);outline-offset:3px}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:70}
#toast{
  position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;font-family:'Jua',sans-serif;border-radius:999px;
  padding:10px 24px;opacity:0;transition:all .3s;z-index:80;pointer-events:none;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:640px){
  .screen{padding:78px 12px 30px}
  .panel{padding:18px}
  .countdown{font-size:5rem}
  .flag{width:26px;height:34px}
}
</style>
</head>
<body>

<!-- ===================== 가랜드(만국기) ===================== -->
<div class="bunting" id="bunting" aria-hidden="true"></div>

<!-- ===================== ① 첫 화면 ===================== -->
<section id="screen-home" class="screen active">
  <div class="home-eyebrow">AI CHARACTER FESTIVAL</div>
  <h1 class="home-title">우리반 <span class="accent">AI 캐릭터</span></h1>
  <div class="home-sub">우리반 AI 캐릭터 게임 🎪</div>
  <div class="home-buttons">
    <button class="btn pink"   data-go="upload"><span class="emoji">📤</span>캐릭터 업로드</button>
    <button class="btn blue"   data-go="games"><span class="emoji">🎮</span>게임 시작</button>
    <button class="btn green"  data-go="gallery"><span class="emoji">🖼️</span>전체 캐릭터 보기</button>
    <button class="btn yellow" data-go="admin"><span class="emoji">⚙️</span>관리자 설정</button>
  </div>
  <div class="home-count" id="home-count"></div>
  <div id="mode-chip" style="font-family:'Jua',sans-serif;font-size:.85rem;border:2px solid var(--ink);border-radius:999px;padding:6px 16px;max-width:92vw"></div>
</section>

<!-- ===================== ② 캐릭터 업로드 ===================== -->
<section id="screen-upload" class="screen">
  <div class="top-bar">
    <button class="btn small" data-go="home">← 홈으로</button>
    <h2>📤 캐릭터 업로드</h2>
  </div>
  <div class="panel">
    <div class="form-grid">
      <div>
        <label for="in-student">이름</label>
        <input type="text" id="in-student" placeholder="예) 김하늘" maxlength="20" autocomplete="off">
      </div>
      <div>
        <label for="in-number">학번</label>
        <input type="text" id="in-number" placeholder="예) 20305" maxlength="20" autocomplete="off" inputmode="numeric">
      </div>
      <div>
        <label for="in-charname">캐릭터 이름</label>
        <input type="text" id="in-charname" placeholder="예) 번개토끼" maxlength="20" autocomplete="off">
      </div>
      <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="캐릭터 이미지 선택">
        <div class="big">🎨</div>
        <div class="jua" style="font-size:1.2rem;margin:6px 0">AI로 만든 캐릭터 이미지를 여기에 놓거나 눌러서 선택</div>
        <div style="opacity:.7;font-size:.9rem" id="file-label">png / jpg / webp / gif 가능 (최대 20MB) — 배경이 투명한 PNG면 더 예뻐요!</div>
        <img class="preview-img" id="preview-img" alt="미리보기">
        <input type="file" id="in-file" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
      </div>
      <button class="btn pink" id="btn-upload">업로드 하기 🚀</button>
      <div class="upload-msg" id="upload-msg"></div>
    </div>
  </div>
</section>

<!-- ===================== ③ 전체 캐릭터 보기 ===================== -->
<section id="screen-gallery" class="screen">
  <div class="top-bar">
    <button class="btn small" data-go="home">← 홈으로</button>
    <h2>🖼️ 캐릭터 전시장</h2>
    <div class="spacer"></div>
    <span class="jua" id="gallery-count"></span>
  </div>
  <div id="gallery-grid" class="gallery2d"></div>
</section>

<!-- ===================== ④ 게임 선택 ===================== -->
<section id="screen-games" class="screen">
  <div class="top-bar">
    <button class="btn small" data-go="home">← 홈으로</button>
    <h2>🎮 어떤 게임을 할까요?</h2>
  </div>
  <div class="game-grid">
    <button class="game-card" data-game="race">
      <div class="icon">🏁</div><h3>레이싱</h3>
      <p>출발선에서 결승선까지! 부스터를 밟으면 순위가 뒤집혀요.</p>
      <span class="tag">스피드 대결</span>
    </button>
    <button class="game-card" data-game="tournament">
      <div class="icon">⚔️</div><h3>토너먼트</h3>
      <p>랜덤 대진표! 체력·공격·방어·행운으로 최강자를 가려요.</p>
      <span class="tag">1:1 배틀</span>
    </button>
    <button class="game-card" data-game="treasure">
      <div class="icon">💎</div><h3>보물찾기</h3>
      <p>맵에 숨겨진 보석을 누가 더 많이 모을까요?</p>
      <span class="tag">점수 모으기</span>
    </button>
    <button class="game-card" data-game="bingo">
      <div class="icon">🎱</div><h3>빙고</h3>
      <p>랜덤으로 뽑히는 우리반 캐릭터! 빙고판을 체크하세요.</p>
      <span class="tag">다 함께</span>
    </button>
    <button class="game-card" data-game="guess">
      <div class="icon">🕵️</div><h3>캐릭터 찾기</h3>

<!-- ===================== Firebase (실시간 공유 저장소) ===================== -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script>
/* ============================================================
   ★★★ 선생님 설정 구역 ★★★
   학생들이 각자 기기에서 올린 캐릭터를 "모든 화면"에서 공유하려면
   Firebase(무료)가 필요합니다. 5분 설정:

   ① https://console.firebase.google.com 접속 → "프로젝트 추가" (이름 자유)
   ② 왼쪽 메뉴 [빌드 → Realtime Database] → "데이터베이스 만들기"
      → 위치 아무거나 → "테스트 모드"로 시작
   ③ 프로젝트 설정(톱니바퀴) → 일반 → 내 앱 → 웹 앱(</>) 추가
      → 나오는 firebaseConfig 값을 아래에 그대로 붙여넣기
   ④ 이 파일을 웹에 올리고 QR코드로 주소 공유 → 끝!

   ※ 아래를 채우지 않아도 사이트는 동작하지만,
     "이 기기 저장 모드"가 되어 기기 간 공유는 되지 않습니다.
     (새로고침해도 유지는 됩니다 — localStorage 사용)
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "여기에_붙여넣기",
  authDomain: "여기에_붙여넣기",
  databaseURL: "여기에_붙여넣기",   // ★ Realtime Database URL (꼭 필요!)
  projectId: "여기에_붙여넣기",
};
</script>

<script>
/* ============================================================
   AI Character Festival (2D) — 메인 스크립트
   외부 라이브러리 0개 · WebGL 불필요 · Canvas 2D 렌더링
   ────────────────────────────────────────────
   1. Store      : 캐릭터 데이터 (브라우저 메모리)
   2. Sound      : WebAudio 배경음악 / 효과음
   3. UI         : 화면 전환, 토스트, 폭죽, 라이트박스
   4. Sprite     : 이미지 로드 / 캔버스에 그리기 도우미
   5. Upload     : 업로드 화면
   6. Gallery    : 캐릭터 전시장 (격자 + 확대보기)
   7. GameHost   : 캔버스 게임 공용 루프 / HUD / 결과
   8. RaceGame / TournamentGame / TreasureGame : 캔버스 게임
   9. BingoGame / GuessGame : 카드 게임
   10. Admin     : 관리자
   ============================================================ */
'use strict';

/* ============================================================
   1. Store — 캐릭터 데이터 저장소
   · Firebase 설정 O : 모든 기기 실시간 공유 (학생 폰 → 교사 화면)
   · Firebase 설정 X : 이 기기의 localStorage에 저장 (새로고침 유지)
   ============================================================ */
let DB = null;   // Firebase Realtime Database 참조 (미설정이면 null)
try{
  if(typeof FIREBASE_CONFIG !== 'undefined' &&
     FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes('여기에')){
    firebase.initializeApp(FIREBASE_CONFIG);
    DB = firebase.database().ref('aicf');   // 데이터 경로: /aicf/characters
  }
}catch(e){
  console.warn('Firebase 초기화 실패 → 이 기기 저장 모드로 동작합니다.', e);
  DB = null;
}

const Store = {
  characters: [],   // {id, studentName, studentId, charName, img(HTMLImageElement), thumbnail(dataURL)}
  MAX: 40,          // 최대 40명 지원
  LS_KEY: 'aicf-characters-v1',
  _announce: false, // 초기 로딩 이후 도착한 캐릭터만 토스트로 알림
  _localSeq: 0,

  count(){ return this.characters.length; },
  all(){ return this.characters; },

  /* 데이터가 바뀌면 현재 보고 있는 화면을 즉시 갱신 (실시간 반영) */
  onChange(){
    UI.refreshCounts();
    if(UI.current === 'gallery') Gallery.render();
    if(UI.current === 'admin')   Admin.render();
  },

  /* dataURL → Image 객체 준비 (게임 캔버스에서 그릴 수 있게) */
  _hydrate(ch){
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => { ch.img = img; resolve(true); };
      img.onerror = () => resolve(false);   // 깨진 데이터는 버림
      img.src = ch.thumbnail;
    });
  },

  _saveLocal(){
    try{
      const plain = this.characters.map(({ img, ...rest }) => rest);
      localStorage.setItem(this.LS_KEY, JSON.stringify(plain));
    }catch(e){
      console.warn('localStorage 저장 실패(용량 초과 가능):', e);
    }
  },

  /* 캐릭터 추가 — 온라인이면 DB에 push(리스너가 화면 반영), 아니면 로컬 저장 */
  async add(data){
    if(DB){
      await DB.child('characters').push(data);   // 실패 시 예외 → 업로드 화면에서 처리
    }else{
      const ch = { ...data, id: 'L' + Date.now() + '_' + (++this._localSeq) };
      await this._hydrate(ch);
      this.characters.push(ch);
      this._saveLocal();
      this.onChange();
    }
  },

  async remove(id){
    if(DB){ await DB.child('characters/' + id).remove(); }
    else{
      this.characters = this.characters.filter(c => c.id !== id);
      this._saveLocal();
      this.onChange();
    }
  },

  async clear(){
    if(DB){ await DB.child('characters').remove(); }
    else{
      this.characters = [];
      this._saveLocal();
      this.onChange();
    }
  },

  /* 시작 시 동기화 : DB 리스너 등록 또는 localStorage 복원 */
  async initSync(){
    if(DB){
      DB.child('characters').on('child_added', async snap => {
        if(this.characters.some(c => c.id === snap.key)) return;
        const ch = { id: snap.key, ...snap.val() };
        if(!ch.thumbnail) return;
        const ok = await this._hydrate(ch);
        if(!ok) return;
        this.characters.push(ch);
        this.onChange();
        if(this._announce){
          Sound.ok();
          UI.toast(`🎉 「${ch.charName}」 캐릭터 도착! (${ch.studentName})`);
        }
      });
      DB.child('characters').on('child_removed', snap => {
        this.characters = this.characters.filter(c => c.id !== snap.key);
        this.onChange();
      });
      setTimeout(() => { this._announce = true; }, 2500);  // 첫 로딩분은 조용히
    }else{
      try{
        const saved = JSON.parse(localStorage.getItem(this.LS_KEY) || '[]');
        for(const ch of saved){
          if(await this._hydrate(ch)) this.characters.push(ch);
        }
      }catch(e){ console.warn('저장된 캐릭터 복원 실패:', e); }
      this.onChange();
    }
  },
};

/* 업로드 이미지 압축 : 긴 변 420px로 축소 → 공유/저장 용량 절약
   (투명 배경 유지 — webp 우선, 미지원 브라우저는 png) */
function compressImage(img, max = 420){
  const scale = Math.min(1, max / Math.max(img.width, img.height));
  const c = document.createElement('canvas');
  c.width  = Math.max(1, Math.round(img.width * scale));
  c.height = Math.max(1, Math.round(img.height * scale));
  c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
  let dataURL = c.toDataURL('image/webp', .85);
  if(!dataURL.startsWith('data:image/webp')) dataURL = c.toDataURL('image/png');
  return dataURL;
}

/* ============================================================
   2. Sound — WebAudio (외부 음원 파일 없이 동작)
   ============================================================ */
const Sound = {
  ctx: null, bgmOn: false, bgmTimer: null, bgmStep: 0,
  ensure(){
    if(!this.ctx){
      try{ this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ this.ctx = null; }
    }
    if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  beep(freqs, dur = .12, type = 'square', vol = .18){
    this.ensure();
    if(!this.ctx) return;
    try{
      freqs.forEach((f, i) => {
        const t = this.ctx.currentTime + i * dur;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type; o.frequency.value = f;
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(.001, t + dur);
        o.connect(g).connect(this.ctx.destination);
        o.start(t); o.stop(t + dur);
      });
    }catch(e){}
  },
  click(){ this.beep([660], .08, 'triangle'); },
  ok(){    this.beep([523, 659, 784], .11, 'triangle'); },
  err(){   this.beep([220, 165], .16, 'sawtooth', .12); },
  count(){ this.beep([440], .18, 'square'); },
  go(){    this.beep([880], .3,  'square'); },
  boost(){ this.beep([600, 900, 1200], .07, 'sawtooth', .12); },
  hit(){   this.beep([180], .1, 'sawtooth', .2); },
  gem(){   this.beep([988, 1319], .09, 'triangle'); },
  win(){   this.beep([523, 659, 784, 1047, 784, 1047], .13, 'triangle', .22); },
  drum(){  this.beep([120, 120, 120], .1, 'sawtooth', .25); },

  /* 배경음악 : 8비트풍 멜로디 루프 */
  MELODY: [523,659,784,659, 523,659,880,784, 587,698,880,698, 784,659,587,523],
  toggleBGM(){
    this.ensure();
    this.bgmOn = !this.bgmOn;
    document.getElementById('btn-sound').textContent = this.bgmOn ? '🔊' : '🔇';
    if(this.bgmOn){
      this.bgmStep = 0;
      this.bgmTimer = setInterval(() => {
        this.beep([this.MELODY[this.bgmStep % this.MELODY.length]], .22, 'triangle', .06);
        this.bgmStep++;
      }, 260);
    }else clearInterval(this.bgmTimer);
  },
};
document.getElementById('btn-sound').addEventListener('click', () => Sound.toggleBGM());

/* ============================================================
   3. UI — 화면 전환 / 토스트 / 폭죽 / 라이트박스
   ============================================================ */
const UI = {
  current: 'home',
  show(name){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    this.current = name;

    if(name === 'gallery') Gallery.render();
    if(name === 'admin')   Admin.render();

  },
  toast(msg){

    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(this._tt);
    this._tt = setTimeout(() => t.classList.remove('show'), 2400);
  },
  refreshCounts(){

    document.getElementById('home-count').textContent =
      n === 0 ? '아직 업로드된 캐릭터가 없어요. 첫 번째 주인공이 되어 보세요!'
              : `지금까지 ${n}명의 캐릭터가 축제에 참가했어요! (최대 ${Store.MAX}명)`;
    document.getElementById('admin-count').textContent = `캐릭터 ${n}명`;
    document.getElementById('gallery-count').textContent = `${n}명 전시 중`;
  },
  /* 캐릭터 확대보기 (라이트박스) */
  lightbox(ch){
    document.getElementById('lb-img').src = ch.thumbnail;
    document.getElementById('lb-name').textContent = ch.charName;
    document.getElementById('lb-owner').textContent = `${ch.studentName} (${ch.studentId})`;
    document.getElementById('lightbox').classList.add('show');
  },
};
document.getElementById('lb-close').addEventListener('click', () =>
  document.getElementById('lightbox').classList.remove('show'));
document.getElementById('lightbox').addEventListener('click', e => {

});
document.querySelectorAll('[data-go]').forEach(b =>

/* 만국기 생성 */
(() => {
  const holder = document.getElementById('bunting');

/* HTML 이스케이프 (학생 입력 표시용) */
function esc(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ---------- 폭죽 (Canvas 2D 파티클) ---------- */
const Confetti = {
  canvas: document.getElementById('confetti-canvas'),
  parts: [], running: false,
  COLORS: ['#FF6B9D','#FFC93C','#4DA8FF','#5FCB77','#9B7EDE','#FF8A5C'],
  burst(count = 140){
    const c = this.canvas;
    c.width = innerWidth; c.height = innerHeight;
    for(let i = 0; i < count; i++){
      this.parts.push({
        x: innerWidth / 2 + (Math.random() - .5) * innerWidth * .5,
        y: innerHeight * .25 + Math.random() * 60,
        vx: (Math.random() - .5) * 9, vy: -Math.random() * 7 - 2,
        s: 5 + Math.random() * 7, r: Math.random() * Math.PI,
        vr: (Math.random() - .5) * .3,
        col: this.COLORS[(Math.random() * this.COLORS.length) | 0],
      });
    }
    if(!this.running){ this.running = true; this.loop(); }
  },
  loop(){
    const ctx = this.canvas.getContext('2d');
    ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.parts.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += .18; p.r += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
      ctx.fillStyle = p.col;
      ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * .6);
      ctx.restore();
    });
    this.parts = this.parts.filter(p => p.y < this.canvas.height + 40);
    if(this.parts.length) requestAnimationFrame(() => this.loop());
    else { this.running = false; ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); }
  },
};

/* ============================================================
   4. Sprite — 이미지 로드 & 캔버스 그리기 도우미
   ============================================================ */
const Sprite = {
  /* File → { dataURL, img } */
  loadFile(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => resolve({ dataURL: reader.result, img });
        img.onerror = () => reject(new Error('이미지를 해석할 수 없음'));
        img.src = reader.result;
      };
      reader.onerror = () => reject(new Error('파일을 읽을 수 없음'));
      reader.readAsDataURL(file);
    });
  },

  /* 캐릭터 그리기 : (x, y)는 "발 밑 중앙" 좌표, h는 표시 높이
     flip=true 면 좌우 반전(왼쪽을 보게), shadow=그림자 표시 */
  draw(ctx, ch, x, y, h, { flip = false, shadow = true, angle = 0 } = {}){
    const img = ch.img;
    const w = h * (img.width / img.height);
    if(shadow){
      ctx.save();
      ctx.fillStyle = 'rgba(61,58,80,.18)';
      ctx.beginPath();
      ctx.ellipse(x, y, w * .38, Math.max(4, h * .06), 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.save();
    ctx.translate(x, y);
    if(angle) ctx.rotate(angle);
    if(flip) ctx.scale(-1, 1);
    ctx.drawImage(img, -w / 2, -h, w, h);
    ctx.restore();
  },

  /* 테스트 캐릭터 : 캔버스로 그린 귀여운 로봇 (수업 전 동작 확인용) */
  makeDemo(color){
    const c = document.createElement('canvas');
    c.width = c.height = 256;
    const x = c.getContext('2d');
    x.fillStyle = color;
    /* 몸통 (구형 브라우저는 roundRect 미지원 → 사각형으로 대체) */
    if(x.roundRect){ x.beginPath(); x.roundRect(78, 120, 100, 100, 26); x.fill(); }
    else x.fillRect(78, 120, 100, 100);
    /* 머리 */
    x.beginPath(); x.arc(128, 78, 52, 0, Math.PI * 2); x.fill();
    /* 안테나 */
    x.strokeStyle = color; x.lineWidth = 8;
    x.beginPath(); x.moveTo(128, 30); x.lineTo(128, 12); x.stroke();
    x.beginPath(); x.arc(128, 10, 8, 0, Math.PI * 2); x.fill();
    /* 눈 + 볼터치 + 입 */
    x.fillStyle = '#3D3A50';
    x.beginPath(); x.arc(108, 74, 9, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(148, 74, 9, 0, Math.PI * 2); x.fill();
    x.strokeStyle = '#3D3A50'; x.lineWidth = 5;
    x.beginPath(); x.arc(128, 88, 12, .2, Math.PI - .2); x.stroke();
    x.fillStyle = 'rgba(255,107,157,.55)';
    x.beginPath(); x.arc(96, 92, 8, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(160, 92, 8, 0, Math.PI * 2); x.fill();
    /* 발 */
    x.fillStyle = '#3D3A50';
    x.beginPath(); x.ellipse(103, 232, 20, 12, 0, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.ellipse(153, 232, 20, 12, 0, 0, Math.PI * 2); x.fill();
    const dataURL = c.toDataURL('image/png');
    const img = new Image();
    img.src = dataURL;
    return { dataURL, img };
  },
};

/* ============================================================
   5. Upload — 캐릭터 업로드
   ============================================================ */
const Upload = {
  file: null,
  init(){
    const dz = document.getElementById('dropzone');
    const input = document.getElementById('in-file');
    dz.addEventListener('click', () => input.click());
    dz.addEventListener('keydown', e => { if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); input.click(); } });
    input.addEventListener('change', () => this.setFile(input.files[0]));
    ['dragover','dragenter'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('drag'); }));
    dz.addEventListener('drop', e => this.setFile(e.dataTransfer.files[0]));
    document.getElementById('btn-upload').addEventListener('click', () => this.submit());
  },
  setFile(f){
    if(!f) return;
    this.file = f;
    document.getElementById('file-label').textContent =
      `선택된 파일 : ${f.name} (${(f.size / 1024 / 1024).toFixed(1)}MB)`;
    /* 즉시 미리보기 */
    const pv = document.getElementById('preview-img');
    const url = URL.createObjectURL(f);
    pv.src = url;
    pv.style.display = 'inline-block';
    pv.onload = () => URL.revokeObjectURL(url);
  },
  msg(text, ok){
    const m = document.getElementById('upload-msg');
    m.textContent = text;
    m.className = 'upload-msg ' + (ok ? 'ok' : 'err');
  },
  async submit(){
    const sName = document.getElementById('in-student').value.trim();
    const sNum  = document.getElementById('in-number').value.trim();
    const cName = document.getElementById('in-charname').value.trim();

    /* ---- 입력 검증 ---- */
    if(!sName || !sNum || !cName){ this.msg('이름, 학번, 캐릭터 이름을 모두 입력해 주세요.', false); Sound.err(); return; }
    if(!this.file){ this.msg('캐릭터 이미지 파일을 선택해 주세요.', false); Sound.err(); return; }
    if(!/\.(png|jpe?g|webp|gif)$/i.test(this.file.name)){
      this.msg('파일이 잘못되었습니다. (png / jpg / webp / gif만 가능해요)', false); Sound.err(); return;
    }
    if(this.file.size > 20 * 1024 * 1024){ this.msg('파일이 너무 커요. 20MB 이하로 줄여 주세요.', false); Sound.err(); return; }
    if(Store.count() >= Store.MAX){ this.msg(`최대 ${Store.MAX}명까지만 참가할 수 있어요.`, false); Sound.err(); return; }

    const btn = document.getElementById('btn-upload');
    btn.disabled = true;
    this.msg('캐릭터를 불러오는 중이에요…', true);

    try{
      const { img } = await Sprite.loadFile(this.file);          // 이미지 해석
      const thumbnail = compressImage(img);                       // 공유용으로 축소
      await Store.add({ studentName: sName, studentId: sNum, charName: cName, thumbnail });
      Sound.ok(); Confetti.burst(80);
      this.msg(DB
        ? `업로드 완료! 「${cName}」 캐릭터가 모두의 화면에 공유되었어요 🎉`
        : `업로드 완료! 「${cName}」 캐릭터가 축제에 참가했어요 🎉`, true);
      UI.toast(`${sName} 학생의 캐릭터가 추가되었어요!`);
      /* 폼 초기화 */
      this.file = null;
      document.getElementById('in-file').value = '';
      document.getElementById('in-charname').value = '';
      document.getElementById('preview-img').style.display = 'none';
      document.getElementById('file-label').textContent =
        'png / jpg / webp / gif 가능 (최대 20MB) — 배경이 투명한 PNG면 더 예뻐요!';
    }catch(err){
      console.error(err);
      Sound.err();
      this.msg(err && err.code   // Firebase 오류는 code가 있음 → 네트워크/권한 문제
        ? '업로드에 실패했어요. 인터넷 연결을 확인하고 다시 시도해 주세요.'
        : '파일이 잘못되었습니다. 이미지 파일을 다시 확인해 주세요.', false);
    }finally{
      btn.disabled = false;
    }
  },
};
Upload.init();

/* ============================================================
   7. GameHost — 캔버스 게임 공용 (루프 / 리사이즈 / HUD / 결과)
   ============================================================ */
const GameHost = {
  canvas: document.getElementById('game-canvas'),
  ctx: null, running: false, game: null, W: 0, H: 0, lastT: 0,

  resize(){
    const stage = document.getElementById('game-stage');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.W = stage.clientWidth;
    this.H = stage.clientHeight;
    this.canvas.width  = this.W * dpr;
    this.canvas.height = this.H * dpr;
    this.ctx = this.canvas.getContext('2d');
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);   // CSS 픽셀 좌표로 그리기
    if(this.game && this.game.onResize) this.game.onResize(this.W, this.H);
  },

  launch(game, title){
    this.stop();
    UI.show('play');
    document.getElementById('play-title').textContent = title;
    this.hud('');
    this.overlay(null);
    document.getElementById('battle-hud').style.display = 'none';
    document.getElementById('battle-log').style.display = 'none';

    this.resize();
    this.game = game;
    if(game.setup(this) === false) return;   // 인원 부족 등으로 시작 실패
    this.running = true;
    this.lastT = performance.now();
    requestAnimationFrame(t => this.loop(t));
  },

  stop(){
    this.running = false;
    if(this.game && this.game.dispose) this.game.dispose();
    this.game = null;
  },

  loop(t){
    if(!this.running) return;
    const dt = Math.min((t - this.lastT) / 1000, .05);
    this.lastT = t;
    if(this.game){
      this.game.update(dt);
      if(this.game){                      // update 중 종료될 수 있음
        this.ctx.clearRect(0, 0, this.W, this.H);
        this.game.draw(this.ctx, this.W, this.H);
      }
    }
    requestAnimationFrame(tt => this.loop(tt));
  },

  hud(html){ document.getElementById('game-hud').innerHTML = html; },
  overlay(html){
    const o = document.getElementById('game-overlay');
    if(html === null){ o.classList.remove('show'); o.innerHTML = ''; }
    else { o.innerHTML = html; o.classList.add('show'); }
  },

  /* 참가자 목록 : 업로드된 수만큼 자동 참가 (10/20/30/40명 대응) */
  participants(min = 2){
    const list = Store.all().slice(0, Store.MAX);
    if(list.length < min){
      UI.toast(`이 게임은 캐릭터가 ${min}명 이상 필요해요. 먼저 업로드해 주세요!`);
      Sound.err();
      UI.show('games');
      return null;
    }
    return list;
  },

  resultHTML(title, rows){
    return `<h2 style="font-size:2rem">${title}</h2>
      <div class="result-list">${rows.map((r, i) => `
        <div class="result-row ${i === 0 ? 'gold' : ''}">
          <div class="rank">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) + '위'}</div>
          <img src="${r.ch.thumbnail}" alt="">
          <div class="who">
            <div class="cname">${esc(r.ch.charName)}</div>
            <div class="sname">${esc(r.ch.studentName)} (${esc(r.ch.studentId)})</div>
          </div>
          ${r.score !== undefined ? `<div class="score">${r.score}</div>` : ''}
        </div>`).join('')}
      </div>
      <button class="btn pink" onclick="window.__replay()">🔄 다시 하기</button>`;
  },
};
window.addEventListener('resize', () => { if(UI.current === 'play') GameHost.resize(); });

/* 배경 그리기 도우미 : 하늘 그라데이션 + 구름 + 언덕 */
function drawSky(ctx, W, H, top = '#BEE7FF', bottom = '#E6F6FF'){
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  /* 구름 (시간에 따라 천천히 흐름) */
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  const t = performance.now() / 40000;
  for(let i = 0; i < 4; i++){
    const cx = ((t * (30 + i * 12) + i * .27) % 1.2 - .1) * W;
    const cy = H * (.08 + i * .07);
    ctx.beginPath();
    ctx.ellipse(cx, cy, 46, 16, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + 28, cy + 4, 30, 12, 0, 0, Math.PI * 2);
    ctx.ellipse(cx - 30, cy + 5, 26, 11, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ============================================================
   8-1. RaceGame — 레이싱 (옆에서 보는 달리기 트랙)
   카운트다운 → 랜덤 속도 + 부스터 → 결승선 → 순위 발표
   ============================================================ */
const RaceGame = {
  TRACK: 3200,   // 결승선까지 거리 (월드 픽셀)

  setup(host){
    this.host = host;
    const chars = host.participants(2);
    if(!chars) return false;

    /* 인원수에 따라 레인 높이/캐릭터 크기 자동 조절 (10~40명 대응) */
    this.n = chars.length;
    this.camX = 0;
    this.finished = [];
    this.state = 'countdown';
    this.count = 3; this.countT = 0;

    this.racers = chars.map((ch, i) => ({
      ch, lane: i, x: 0,
      base: 150 + Math.random() * 110,   // 랜덤 기본 속도(px/s)
      boostT: 0, done: false,
      bob: Math.random() * 6,
    }));

    /* 부스터 패드 : 트랙 중간중간 랜덤 배치 */
    this.boosters = [];
    for(let i = 0; i < Math.max(6, this.n); i++){
      this.boosters.push({
        x: 400 + Math.random() * (this.TRACK - 800),
        lane: (Math.random() * this.n) | 0,
        used: false,
      });
    }

    host.hud(`<div class="hud-box">🏁 참가 ${this.n}명</div>`);
    host.overlay(`<div class="countdown">3</div>`);
    Sound.count();
    return true;
  },

  update(dt){
    const host = this.host;

    if(this.state === 'countdown'){
      this.countT += dt;
      if(this.countT >= 1){
        this.countT = 0; this.count--;
        if(this.count > 0){ host.overlay(`<div class="countdown">${this.count}</div>`); Sound.count(); }
        else if(this.count === 0){ host.overlay(`<div class="countdown" style="color:var(--green)">출발!</div>`); Sound.go(); }
        else { host.overlay(null); this.state = 'race'; }
      }
      return;
    }
    if(this.state === 'end') return;

    /* ---- 달리기 ---- */
    this.racers.forEach(r => {
      if(r.done) return;
      let v = r.base + Math.sin(performance.now() / 400 + r.lane) * 40 + Math.random() * 20;
      if(r.boostT > 0){ v += 320; r.boostT -= dt; }
      r.x += v * dt;

      /* 부스터 충돌 */
      this.boosters.forEach(b => {
        if(!b.used && b.lane === r.lane && Math.abs(b.x - r.x) < 22){
          b.used = true; r.boostT = 1.1;
          Sound.boost();
          UI.toast(`⚡ ${r.ch.charName} 부스터 발동!`);
        }
      });

      /* 결승선 통과 */
      if(r.x >= this.TRACK){
        r.done = true; r.x = this.TRACK;
        this.finished.push(r);
        if(this.finished.length === 1){ Sound.win(); Confetti.burst(160); }
        else Sound.ok();
      }
    });

    /* 카메라 : 선두 따라가기 */
    const leadX = Math.max(...this.racers.map(r => r.x));
    const target = Math.max(0, Math.min(leadX - host.W * .55, this.TRACK - host.W + 80));
    this.camX += (target - this.camX) * Math.min(1, dt * 4);

    /* 순위 HUD */
    const order = [...this.racers].sort((a, b) => b.x - a.x);
    host.hud(`<div class="hud-box big">🥇 ${esc(order[0].ch.charName)}</div>
              <div class="hud-box">도착 ${this.finished.length} / ${this.n}</div>`);

    /* 전원 도착 → 결과 */
    if(this.finished.length === this.n){
      this.state = 'end';
      setTimeout(() => {
        if(GameHost.game === this)
          host.overlay(host.resultHTML('🏁 레이싱 결과', this.finished.map(r => ({ ch: r.ch }))));
      }, 700);
    }
  },

  draw(ctx, W, H){
    drawSky(ctx, W, H);

    /* 트랙 영역 : 화면 아래 72% */
    const trackTop = H * .24;
    const laneH = (H - trackTop) / this.n;
    const charH = Math.min(Math.max(laneH * 1.35, 26), 90);  // 인원 많으면 자동 축소

    /* 잔디 + 트랙 바닥 */
    ctx.fillStyle = '#A9DC92';
    ctx.fillRect(0, trackTop - 26, W, 26);
    ctx.fillStyle = '#E8C79A';
    ctx.fillRect(0, trackTop, W, H - trackTop);

    /* 레인 구분선 */
    ctx.strokeStyle = 'rgba(255,255,255,.8)';
    ctx.lineWidth = 2;
    for(let i = 1; i < this.n; i++){
      const y = trackTop + laneH * i;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    /* 출발선 / 결승선 (체크무늬) */
    [[0, '#ffffff'], [this.TRACK, null]].forEach(([wx]) => {
      const sx = wx - this.camX;
      if(sx < -30 || sx > W + 30) return;
      for(let y = trackTop; y < H; y += 14){
        ctx.fillStyle = ((y / 14) | 0) % 2 ? '#3D3A50' : '#ffffff';
        ctx.fillRect(sx - 5, y, 10, 14);
      }
    });
    /* 결승 깃발 */
    const fx = this.TRACK - this.camX;
    if(fx > -60 && fx < W + 60){
      ctx.font = `${Math.min(40, laneH)}px serif`;
      ctx.fillText('🏁', fx + 8, trackTop - 6);
    }

    /* 부스터 패드 */
    this.boosters.forEach(b => {
      if(b.used) return;
      const sx = b.x - this.camX;
      if(sx < -30 || sx > W + 30) return;
      const y = trackTop + laneH * (b.lane + .78);
      ctx.fillStyle = '#FFC93C';
      ctx.strokeStyle = '#3D3A50'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(sx, y, 16, 7, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#3D3A50';
      ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('⚡', sx, y + 4);
      ctx.textAlign = 'left';
    });

    /* 레이서 (달리는 통통 효과) */
    this.racers.forEach(r => {
      const sx = r.x - this.camX;
      if(sx < -80 || sx > W + 80) return;
      const baseY = trackTop + laneH * (r.lane + .92);
      const hop = r.done ? 0 : Math.abs(Math.sin(performance.now() / 90 + r.bob)) * laneH * .12;
      /* 부스터 중이면 뒤에 스피드 라인 */
      if(r.boostT > 0){
        ctx.strokeStyle = 'rgba(255,159,28,.7)'; ctx.lineWidth = 3;
        for(let k = 0; k < 3; k++){
          ctx.beginPath();
          ctx.moveTo(sx - 26 - k * 10, baseY - charH * (.3 + k * .18));
          ctx.lineTo(sx - 44 - k * 10, baseY - charH * (.3 + k * .18));
          ctx.stroke();
        }
      }
      Sprite.draw(ctx, r.ch, sx, baseY - hop, charH);
    });
  },

  dispose(){ this.racers = []; this.boosters = []; },
};

/* ============================================================
   8-2. TournamentGame — 토너먼트 (랜덤 대진 → 자동 전투 → 우승)
   체력/공격력/방어력/행운 랜덤 · 부전승 처리
   ============================================================ */
const TournamentGame = {
  setup(host){
    this.host = host;
    const chars = host.participants(2);
    if(!chars) return false;

    /* 셔플 후 스탯 랜덤 부여 */
    this.queue = [...chars].sort(() => Math.random() - .5).map(ch => ({
      ch,
      hp:   80 + (Math.random() * 60 | 0),
      atk:  8  + (Math.random() * 12 | 0),
      def:  (Math.random() * 6  | 0),
      luck: (Math.random() * 30 | 0),
    }));
    this.winners = [];
    this.matchLog = [];
    this.fx = [];           // 타격 이펙트
    this.state = 'idle';
    this.nextMatch();
    return true;
  },

  nextMatch(){
    const host = this.host;

    if(this.queue.length === 0){
      if(this.winners.length === 1){          // 🏆 최종 우승
        const champ = this.winners[0];
        Sound.win(); Confetti.burst(220);
        this.state = 'done';
        host.overlay(`
          <h2 style="font-size:2.2rem">🏆 최종 우승!</h2>
          <img class="champ-img" src="${champ.ch.thumbnail}" alt="">
          <div class="jua" style="font-size:1.8rem">${esc(champ.ch.charName)}</div>
          <div>${esc(champ.ch.studentName)} (${esc(champ.ch.studentId)})</div>
          <div class="bracket">${this.matchLog.map(m => `<div class="match">${m}</div>`).join('')}</div>
          <button class="btn pink" onclick="window.__replay()">🔄 다시 하기</button>`);
        return;
      }
      this.queue = this.winners;
      this.winners = [];
    }

    if(this.queue.length === 1){              // 홀수 인원 → 부전승
      const bye = this.queue.shift();
      this.winners.push(bye);
      this.matchLog.push(`${esc(bye.ch.charName)} — 부전승 진출`);
      this.nextMatch();
      return;
    }

    this.A = this.queue.shift();
    this.B = this.queue.shift();
    this.A.curHp = this.A.hp; this.B.curHp = this.B.hp;
    this.A.ox = 0; this.B.ox = 0;        // 돌진 오프셋
    this.A.fall = 0; this.B.fall = 0;    // 쓰러짐 각도
    this.state = 'intro';
    this.timer = 0;
    this.turn = 'A';
    this.kick = null; this.shakeT = 0;

    document.getElementById('battle-hud').style.display = 'flex';
    this.refreshHUD();
    this.log(`⚔️ ${this.A.ch.charName} VS ${this.B.ch.charName}`);
    Sound.drum();
  },

  refreshHUD(){
    [['a', this.A], ['b', this.B]].forEach(([k, f]) => {
      const el = document.getElementById('fighter-' + k);
      el.querySelector('.fname').textContent = f.ch.charName;
      const pct = Math.max(0, f.curHp / f.hp * 100);
      const fill = el.querySelector('.hp-fill');
      fill.style.width = pct + '%';
      fill.classList.toggle('low', pct < 35);
      el.querySelector('.stats').textContent = `체력${f.hp} 공격${f.atk} 방어${f.def} 행운${f.luck}`;
    });
  },

  log(msg){
    const el = document.getElementById('battle-log');
    el.style.display = 'block';
    el.textContent = msg;
  },

  update(dt){
    if(this.state === 'done' || !this.A) return;
    this.timer += dt;
    this.fx = this.fx.filter(f => (f.t += dt) < .5);

    if(this.state === 'intro' && this.timer > 1.4){ this.state = 'fight'; this.timer = 0; }

    /* ---- 자동 전투 : 0.9초마다 번갈아 공격 ---- */
    if(this.state === 'fight' && this.timer > .9){
      this.timer = 0;
      const [atk, def] = this.turn === 'A' ? [this.A, this.B] : [this.B, this.A];

      const crit = Math.random() * 100 < atk.luck;                 // 행운 = 크리티컬 확률
      let dmg = Math.max(2, atk.atk - def.def * .5 + Math.random() * 6);
      if(crit) dmg *= 2;
      def.curHp -= Math.round(dmg);
      Sound.hit();
      this.log(crit ? `💥 ${atk.ch.charName}의 크리티컬! ${Math.round(dmg)} 데미지!`
                    : `👊 ${atk.ch.charName}의 공격! ${Math.round(dmg)} 데미지`);

      this.kick = { who: this.turn, t: 0 };
      this.shakeT = .35;
      this.fx.push({ side: this.turn === 'A' ? 'B' : 'A', t: 0, crit });
      this.refreshHUD();

      if(def.curHp <= 0){
        this.state = 'ko'; this.timer = 0;
        this.winner = atk; this.loser = def;
        this.matchLog.push(`${esc(atk.ch.charName)} <span class="w">승</span> vs ${esc(def.ch.charName)}`);
        this.log(`🎉 ${atk.ch.charName} 승리!`);
        Sound.ok();
      }else{
        this.turn = this.turn === 'A' ? 'B' : 'A';
      }
    }

    /* 돌진 연출 */
    if(this.kick){
      this.kick.t += dt * 6;
      const k = Math.sin(Math.min(this.kick.t, Math.PI));
      const f = this.kick.who === 'A' ? this.A : this.B;
      f.ox = k * (this.kick.who === 'A' ? 1 : -1);
      if(this.kick.t >= Math.PI){ f.ox = 0; this.kick = null; }
    }
    if(this.shakeT > 0) this.shakeT -= dt;

    /* 쓰러짐 → 다음 경기 */
    if(this.state === 'ko'){
      this.loser.fall = Math.min(this.loser.fall + dt * 2.4, Math.PI / 2);
      if(this.timer > 1.8){
        this.winners.push(this.winner);
        this.A = this.B = null;
        this.nextMatch();
      }
    }
  },

  draw(ctx, W, H){
    drawSky(ctx, W, H, '#FFE3EC', '#FFF3E4');   // 배틀장 : 분홍빛 하늘

    /* 경기장 */
    const groundY = H * .78;
    ctx.fillStyle = '#A9DC92';
    ctx.fillRect(0, groundY, W, H - groundY);
    ctx.fillStyle = '#FFF3C4';
    ctx.strokeStyle = '#FF6B9D'; ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.ellipse(W / 2, groundY + 8, W * .38, 26, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();

    if(!this.A || !this.B) return;

    const charH = Math.min(H * .4, 200);
    const gap = Math.min(W * .26, 240);
    const xA = W / 2 - gap + this.A.ox * gap * .8;
    const xB = W / 2 + gap + this.B.ox * gap * .8;
    let shake = 0;
    if(this.shakeT > 0) shake = Math.sin(performance.now() / 25) * 5 * this.shakeT;

    /* A는 오른쪽을 봄(원본), B는 왼쪽을 봄(반전) — 서로 마주보기 */
    Sprite.draw(ctx, this.A.ch, xA + (this.loser === this.A ? 0 : shake), groundY + 6, charH,
                { angle: this.A.fall ? -this.A.fall : 0 });
    Sprite.draw(ctx, this.B.ch, xB + (this.loser === this.B ? 0 : shake), groundY + 6, charH,
                { flip: true, angle: this.B.fall ? this.B.fall : 0 });

    /* 타격 이펙트 (POW!) */
    this.fx.forEach(f => {
      const x = f.side === 'A' ? xA : xB;
      const a = 1 - f.t * 2;
      ctx.save();
      ctx.globalAlpha = Math.max(0, a);
      ctx.font = `bold ${f.crit ? 46 : 32}px 'Jua', sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = f.crit ? '#FF3D71' : '#FF9F1C';
      ctx.strokeStyle = '#3D3A50'; ctx.lineWidth = 3;
      const ty = groundY - charH * .7 - f.t * 60;
      ctx.strokeText(f.crit ? '크리티컬!' : '퍽!', x, ty);
      ctx.fillText(f.crit ? '크리티컬!' : '퍽!', x, ty);
      ctx.restore();
      ctx.textAlign = 'left';
    });

    /* VS 표시 */
    if(this.state === 'intro'){
      ctx.font = "bold 64px 'Jua', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FF6B9D';
      ctx.strokeStyle = '#3D3A50'; ctx.lineWidth = 4;
      ctx.strokeText('VS', W / 2, H * .42);
      ctx.fillText('VS', W / 2, H * .42);
      ctx.textAlign = 'left';
    }
  },

  dispose(){
    document.getElementById('battle-hud').style.display = 'none';
    document.getElementById('battle-log').style.display = 'none';
    this.A = this.B = null;
    this.state = 'done';
  },
};

/* ============================================================
   8-3. TreasureGame — 보물찾기 (작은 맵 · 랜덤 이동 · 보석 · 점수)
   ============================================================ */
const TreasureGame = {
  DURATION: 30,

  setup(host){
    this.host = host;
    const chars = host.participants(2);
    if(!chars) return false;

    this.n = chars.length;
    this.time = this.DURATION;
    this.state = 'play';

    /* 맵 = 캔버스 전체(테두리 안쪽) — 인원수에 따라 캐릭터 크기 자동 조절 */
    this.charH = this.n > 24 ? 34 : this.n > 12 ? 44 : 56;

    this.hunters = chars.map(ch => ({
      ch, score: 0,
      x: 60 + Math.random() * (host.W - 120),
      y: 80 + Math.random() * (host.H - 140),
      dir: Math.random() * Math.PI * 2,
      speed: 70 + Math.random() * 50,
      turnT: 0,
    }));

    /* 보석 : 인원수 비례 (인원 자동 조절) */
    const gemCount = Math.min(60, this.n * 3 + 8);
    const cols = ['#FF6B9D', '#4DA8FF', '#5FCB77', '#FFC93C', '#9B7EDE'];
    this.gems = [];
    for(let i = 0; i < gemCount; i++){
      this.gems.push({
        x: 40 + Math.random() * (host.W - 80),
        y: 60 + Math.random() * (host.H - 110),
        col: cols[i % cols.length],
        spin: Math.random() * 6,
        alive: true,
      });
    }
    Sound.go();
    return true;
  },

  onResize(W, H){
    /* 화면 크기가 바뀌면 맵 밖 요소를 안으로 */
    this.hunters.forEach(h => { h.x = Math.min(h.x, W - 40); h.y = Math.min(h.y, H - 30); });
    this.gems.forEach(g => { g.x = Math.min(g.x, W - 30); g.y = Math.min(g.y, H - 30); });
  },

  update(dt){
    if(this.state !== 'play') return;
    const host = this.host;
    this.time -= dt;

    this.hunters.forEach(h => {
      /* 방향 전환 : 가까운 보석 쪽으로 살짝 끌림 + 랜덤 */
      h.turnT -= dt;
      if(h.turnT <= 0){
        h.turnT = .6 + Math.random() * 1.2;
        let nearest = null, nd = 180;
        this.gems.forEach(g => {
          if(!g.alive) return;
          const d = Math.hypot(g.x - h.x, g.y - h.y);
          if(d < nd){ nd = d; nearest = g; }
        });
        h.dir = nearest
          ? Math.atan2(nearest.y - h.y, nearest.x - h.x) + (Math.random() - .5) * .6
          : Math.random() * Math.PI * 2;
      }

      /* 이동 + 벽 반사 */
      h.x += Math.cos(h.dir) * h.speed * dt;
      h.y += Math.sin(h.dir) * h.speed * dt;
      if(h.x < 40 || h.x > host.W - 40){ h.dir = Math.PI - h.dir; h.x = Math.max(40, Math.min(host.W - 40, h.x)); }
      if(h.y < 60 || h.y > host.H - 20){ h.dir = -h.dir; h.y = Math.max(60, Math.min(host.H - 20, h.y)); }

      /* 보석 획득 */
      this.gems.forEach(g => {
        if(g.alive && Math.hypot(g.x - h.x, g.y - (h.y - this.charH * .4)) < this.charH * .5){
          g.alive = false;
          h.score++;
          Sound.gem();
        }
      });
    });

    const top = [...this.hunters].sort((a, b) => b.score - a.score)[0];
    host.hud(`<div class="hud-box big">⏱️ ${Math.max(0, Math.ceil(this.time))}초</div>
              <div class="hud-box">💎 남은 보석 ${this.gems.filter(g => g.alive).length}</div>
              <div class="hud-box">1위 ${esc(top.ch.charName)} (${top.score})</div>`);

    if(this.time <= 0 || this.gems.every(g => !g.alive)){
      this.state = 'end';
      Sound.win(); Confetti.burst(160);
      const rows = [...this.hunters].sort((a, b) => b.score - a.score)
        .map(h => ({ ch: h.ch, score: '💎 ' + h.score }));
      host.overlay(host.resultHTML('💎 보물찾기 결과', rows));
    }
  },

  draw(ctx, W, H){
    /* 풀밭 맵 + 테두리 */
    ctx.fillStyle = '#A9DC92';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    for(let i = 0; i < 24; i++){                      // 풀 무늬 점
      const gx = (i * 97) % W, gy = 40 + (i * 53) % (H - 60);
      ctx.beginPath(); ctx.arc(gx, gy, 3, 0, Math.PI * 2); ctx.fill();
    }
    ctx.strokeStyle = '#8C6A46'; ctx.lineWidth = 8;
    ctx.strokeRect(8, 8, W - 16, H - 16);

    /* 보석 (다이아 모양, 반짝이며 둥실) */
    this.gems.forEach(g => {
      if(!g.alive) return;
      const bob = Math.sin(performance.now() / 300 + g.spin) * 3;
      const s = 9;
      ctx.save();
      ctx.translate(g.x, g.y + bob);
      ctx.fillStyle = g.col;
      ctx.strokeStyle = '#3D3A50'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -s); ctx.lineTo(s * .8, 0); ctx.lineTo(0, s); ctx.lineTo(-s * .8, 0);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,.7)';
      ctx.beginPath(); ctx.arc(-2, -3, 2, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    });

    /* 헌터 : 이동 방향에 따라 좌우 반전 + 통통 */
    this.hunters.forEach(h => {
      const hop = Math.abs(Math.sin(performance.now() / 110 + h.speed)) * 4;
      Sprite.draw(ctx, h.ch, h.x, h.y - hop, this.charH, { flip: Math.cos(h.dir) < 0 });
      /* 머리 위 점수 뱃지 */
      if(h.score > 0){
        ctx.font = "bold 12px 'Jua', sans-serif";
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#3D3A50'; ctx.lineWidth = 2;
        const bw = 34;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(h.x - bw / 2, h.y - this.charH - 20, bw, 16, 8)
                      : ctx.rect(h.x - bw / 2, h.y - this.charH - 20, bw, 16);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#3D3A50';
        ctx.fillText('💎' + h.score, h.x, h.y - this.charH - 8);
        ctx.textAlign = 'left';
      }
    });
  },

  dispose(){ this.hunters = []; this.gems = []; },
};

/* ============================================================
   9-1. BingoGame — 빙고 (전체 캐릭터 → 랜덤 추첨 → 빙고판 체크)
   ============================================================ */
const BingoGame = {
  start(){
    const chars = Store.all();
    if(chars.length < 2){
      UI.toast('빙고는 캐릭터가 2명 이상 필요해요. 먼저 업로드해 주세요!');
      Sound.err(); return;

    document.getElementById('pick-title').textContent = '🎱 캐릭터 빙고';
    this.pool = [...chars];
    this.picked = [];
    this.render();
  },

  render(){
    const stage = document.getElementById('pick-stage');
    const last = this.picked[this.picked.length - 1];
    stage.innerHTML = `
      <p class="jua" style="font-size:1.1rem">전체 ${Store.count()}명 중 <b style="color:var(--pink)">${this.picked.length}명</b> 뽑았어요 —
        자기 빙고판에 나온 캐릭터를 체크하세요!</p>
      <div class="pick-big" id="bingo-big">
        ${last ? `<img src="${last.thumbnail}" alt="">` : `<div class="qmark">?</div>`}
      </div>
      <div class="pick-name">${last ? esc(last.charName) + ' — ' + esc(last.studentName) : '버튼을 눌러 추첨을 시작하세요'}</div>
      <button class="btn purple" id="btn-draw" ${this.pool.length === 0 ? 'disabled' : ''}>
        ${this.pool.length === 0 ? '모든 캐릭터를 뽑았어요!' : '🎲 다음 캐릭터 뽑기'}</button>
      <div>
        <p class="jua" style="margin-bottom:8px;opacity:.7">지금까지 나온 캐릭터</p>
        <div class="picked-strip">
          ${this.picked.map(c => `<img src="${c.thumbnail}" title="${esc(c.charName)}" alt="${esc(c.charName)}">`).join('')
            || '<span style="opacity:.5">아직 없어요</span>'}
        </div>
      </div>`;
    const btn = document.getElementById('btn-draw');
    if(btn && this.pool.length) btn.addEventListener('click', () => this.draw());
  },

  /* 두구두구 룰렛 연출 후 추첨 */
  draw(){
    document.getElementById('btn-draw').disabled = true;
    const big = document.getElementById('bingo-big');
    big.classList.add('spin');
    Sound.drum();
    let ticks = 0;
    const spin = setInterval(() => {
      const rand = this.pool[(Math.random() * this.pool.length) | 0];
      big.innerHTML = `<img src="${rand.thumbnail}" alt="">`;
      Sound.click();
      if(++ticks >= 12){
        clearInterval(spin);
        const chosen = this.pool.splice((Math.random() * this.pool.length) | 0, 1)[0];
        this.picked.push(chosen);
        Sound.win(); Confetti.burst(70);
        this.render();
      }
    }, 130);
  },
};

const GuessGame = {
  start(){
    const chars = Store.all();
    if(chars.length < 2){
      UI.toast('캐릭터 찾기는 2명 이상 필요해요. 먼저 업로드해 주세요!');
      Sound.err(); return;
    }
    UI.show('pick');
    document.getElementById('pick-title').textContent = '🕵️ 캐릭터 찾기';
    this.answer = chars[(Math.random() * chars.length) | 0];
    this.hintLevel = 0;
    this.render(false);
  },

  hints(){
    const a = this.answer;
    return [
      `캐릭터 이름은 <b>${a.charName.length}글자</b>예요.`,
      `캐릭터 이름은 <b>「${esc(a.charName[0])}」</b>(으)로 시작해요.`,
      `만든 학생의 학번은 <b>${esc(a.studentId)}</b>이에요.`,
      `만든 학생 이름은 <b>「${esc(a.studentName[0])}」</b>(으)로 시작해요.`,
    ];
  },

  render(revealed){
    const stage = document.getElementById('pick-stage');
    const shown = this.hints().slice(0, this.hintLevel);
    stage.innerHTML = `
      <p class="jua" style="font-size:1.1rem">검은 그림자의 주인공은 누구일까요? 다 같이 외쳐 보세요!</p>
      <div class="pick-big silhouette ${revealed ? 'reveal' : ''}">
        <img src="${this.answer.thumbnail}" alt="비밀 캐릭터">
      </div>
      <div class="pick-name">${revealed ? '정답 : ' + esc(this.answer.charName) + ' — ' + esc(this.answer.studentName) : '???'}</div>
      <div class="hint-box">
        <div class="jua">💡 힌트 (${shown.length}/${this.hints().length})</div>
        <ul>${shown.map(h => `<li>${h}</li>`).join('') || '<li style="list-style:none;margin-left:0;opacity:.6">힌트 버튼을 눌러 보세요</li>'}</ul>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        ${revealed
          ? `<button class="btn purple" id="btn-next-guess">🔁 다른 캐릭터로 한 번 더</button>`
          : `<button class="btn blue" id="btn-hint" ${this.hintLevel >= this.hints().length ? 'disabled' : ''}>💡 힌트 보기</button>
             <button class="btn green" id="btn-reveal">✅ 정답 공개</button>`}
      </div>`;

    if(!revealed){
      document.getElementById('btn-hint').addEventListener('click', () => {
        this.hintLevel++; Sound.click(); this.render(false);
      });
      document.getElementById('btn-reveal').addEventListener('click', () => {
        Sound.win(); Confetti.burst(120); this.render(true);
      });
    }else{
      document.getElementById('btn-next-guess').addEventListener('click', () => { Sound.click(); this.start(); });
    }
  },
};

/* ============================================================
   게임 시작 라우팅 (교사는 버튼만 누르면 전원 자동 참가)
   ============================================================ */
let currentGameKey = null;
function startGame(key){
  currentGameKey = key;
  switch(key){
    case 'race':       GameHost.launch(Object.create(RaceGame),       '🏁 레이싱'); break;
    case 'tournament': GameHost.launch(Object.create(TournamentGame), '⚔️ 토너먼트'); break;
    case 'treasure':   GameHost.launch(Object.create(TreasureGame),   '💎 보물찾기'); break;
    case 'bingo':      BingoGame.start(); break;
    case 'guess':      GuessGame.start(); break;
  }
}
window.__replay = () => { Sound.click(); startGame(currentGameKey); };
document.querySelectorAll('[data-game]').forEach(card =>
  card.addEventListener('click', () => { Sound.click(); startGame(card.dataset.game); }));
document.getElementById('btn-replay').addEventListener('click', window.__replay);
document.getElementById('btn-quit-game').addEventListener('click', () => { Sound.click(); UI.show('games'); });

        Store.clear(); Sound.err(); UI.toast('전체 초기화 완료!');

    });

    /* 테스트 캐릭터 : 수업 전 게임 동작 확인용 */
    document.getElementById('btn-demo').addEventListener('click', async () => {
      const names = ['번개토끼','솜사탕곰','로켓펭귄','무지개냥','반짝공룡','우주고래','딸기여우','바람이','콩콩이','별사탕'];
      const cols  = ['#FF6B9D','#4DA8FF','#5FCB77','#FFC93C','#9B7EDE','#FF8A5C','#53C8D8','#E96FC0','#8BC34A','#F06262'];
      const base = Store.count();
      let added = 0;
      for(let i = 0; i < 5 && base + i < Store.MAX; i++){
        const n = base + i;

        try{
          await Store.add({
            studentName: '테스트' + (n + 1),

      this.render();
    });

};

  const chip = document.getElementById('mode-chip');
  if(DB){
    chip.textContent = '🟢 온라인 공유 모드 — 모든 기기의 업로드가 실시간으로 모여요';
    chip.style.background = '#E3F9E8';
  }else{
    chip.textContent = '🟡 이 기기 저장 모드 — 새로고침해도 유지되지만 기기 간 공유는 안 돼요 (Firebase 설정으로 공유 가능)';
    chip.style.background = '#FFF3C4';
  }
})();
UI.refreshCounts();
Store.initSync();
</script>
